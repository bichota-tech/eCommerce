<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Producto | Mini eCommerce</title>
    <meta name="description" content="Información detallada del producto.">
    <meta name="theme-color" content="#101010">
    <link rel="manifest" href="manifest.json">
    
    <!-- Open Graph SEO -->
    <meta property="og:title" content="Detalle de Producto | Mini eCommerce">
    <meta property="og:description" content="Información detallada del producto.">
    <meta property="og:type" content="website">
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="detail-page">
    <!-- Navbar -->
    <header class="navbar">
        <div class="container navbar-content">
            <a href="index.html" class="logo">
                <i class="bi bi-bag-fill logo-icon"></i>
                <span class="logo-text">LuxeStore</span>
            </a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Catálogo</a>
                <a href="categorias.html" class="nav-link">Categorías</a>
                <a href="ofertas.html" class="nav-link">Ofertas</a>
            </nav>
            <div class="cart-icon">
                <i class="bi bi-cart3"></i>
                <span class="cart-count">0</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container product-detail-container">
        <!-- Botón Volver -->
        <a href="index.html" class="back-link">
            <i class="bi bi-arrow-left"></i>
            Volver al catálogo
        </a>

        <!-- Loader -->
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p>Cargando detalles...</p>
        </div>

        <!-- Error State -->
        <div id="error-state" class="error-container hidden" style="text-align: center; margin: 3rem 0;">
            <i class="bi bi-exclamation-triangle error-icon"></i>
            <p id="error-message">Error al cargar el detalle del producto.</p>
            <a href="index.html" class="btn-primary" style="display: inline-block; margin-top: 1rem;">Volver al catálogo</a>
        </div>

        <!-- Product Detail Section -->
        <article id="product-detail" class="product-detail hidden">
            <div class="product-image-wrapper">
                <img id="detail-image" src="" alt="Imagen del producto" class="detail-image">
            </div>
            <div class="product-info-wrapper">
                <span id="detail-category" class="detail-category">Categoría</span>
                <h1 id="detail-title" class="detail-title">Cargando...</h1>
                <div class="detail-rating">
                    <span id="detail-stars" class="stars"></span>
                    <span id="detail-count" class="reviews-count">(0 reseñas)</span>
                </div>
                <div id="detail-price" class="detail-price">$0.00</div>
                <div class="detail-description-box">
                    <h3>Descripción</h3>
                    <p id="detail-description" class="detail-description">Cargando descripción...</p>
                </div>
                <div class="detail-actions">
                    <button class="btn-primary" onclick="alert('Funcionalidad de carrito no implementada')">Añadir al carrito</button>
                </div>
            </div>
        </article>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-brand">
                <span class="logo-text">LuxeStore</span>
            </div>
            <p>&copy; 2026 LuxeStore. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/app.js"></script>
</body>
</html>
